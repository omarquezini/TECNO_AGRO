<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Rural Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h2>🚜 Gestão Rural Inteligente</h2>

    <select id="unidade">
        <option value="hectare">Hectares</option>
        <option value="alqueire_sp">Alqueire Paulista</option>
    </select>

    <input type="number" id="area" placeholder="Área">
    <input type="number" id="preco" placeholder="Preço combustível (R$)">

    <select id="trator">
        <option value="10">Trator T3F New Holland CV </option>
        <option value="20">Tratores Série 30 New Holland CV</option>
        <option value="30">Trator TT e TTF New Holland CV</option>
        <option value="40">Trator T6 New Holland CV</option>
        <option value="50">Trator T3F New Holland</option>
        <option value="60">Trator T6.140 Eletro Command</option>
        <option value="70">Trator T4 New Holland</option>
        <option value="80">Trator T6 Methane Power</option>
        <option value="90">Trator T4.75S New Holland</option>
        <option value="09">Trator T7 SWB New Holland</option>
        <option value="08">Trator TT4 New Holland</option>
        <option value="07">Trator T7 LWB New Holland</option>
        <option value="06">Trator TL5 New Holland</option>
        <option value="05">Trator T7.300 Auto Command</option>
        <option value="04">Trator T5 New Holland</option>
        <option value="03">Trator T8 PLM Intelligence™ New Holland</option>
        <option value="02">Trator T5.110 S New Holland</option>
        <option value="01">Trator T9 PLM Intelligence™ New Holland</option>


    </select>

    <select id="operacao">
        <option value="plantar">Plantar</option>
    </select>

    <select id="combustivel">
        <option value="diesel">Diesel</option>
        <option value="gasolina">Gasolina</option>
    </select>

    <button onclick="calcular()">CALCULAR</button>

    <p id="erro" class="erro"></p>

    <div id="resultado">
        <div class="res-item">Área convertida: <span id="areaConv"></span></div>
        <div class="res-item">Tempo: <span id="tempo"></span></div>
        <div class="res-item">Combustível: <span id="comb"></span></div>
        <div class="res-item">Consumo/h: <span id="consumo"></span></div>
        <div class="res-item">Custo: <span id="precoTotal"></span></div>

        <canvas id="grafico"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
